server {
    listen 80;
    server_name YOUR_FQDN;

    # Redireciona HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_FQDN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_FQDN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_FQDN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Somente o endpoint do Telegram é exposto publicamente
    location /webhooks/telegram {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Healthcheck acessível internamente e pelo CI
    location /health {
        proxy_pass       http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Bloqueia qualquer outro acesso
    location / {
        return 404;
    }
}
